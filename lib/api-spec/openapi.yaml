openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Duollance HR Template Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Template category operations
  - name: templates
    description: Message template operations
  - name: stats
    description: Stats and analytics
  - name: knowledge
    description: Knowledge base document operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Validation error

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List templates with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: channel
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: favorited
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Validation error

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a single template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /templates/{id}/use:
    post:
      operationId: recordTemplateUse
      tags: [templates]
      summary: Increment template usage count
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usage recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found

  /templates/{id}/favorite:
    patch:
      operationId: toggleFavorite
      tags: [templates]
      summary: Toggle favorite status on a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorite toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Not found

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /knowledge:
    get:
      operationId: listKnowledgeDocs
      tags: [knowledge]
      summary: List all knowledge documents
      responses:
        "200":
          description: List of knowledge docs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeDoc"
    post:
      operationId: createKnowledgeDoc
      tags: [knowledge]
      summary: Create a new knowledge document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeDocInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDoc"

  /knowledge/{id}:
    patch:
      operationId: updateKnowledgeDoc
      tags: [knowledge]
      summary: Update a knowledge document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeDocUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDoc"
        "404":
          description: Not found
    delete:
      operationId: deleteKnowledgeDoc
      tags: [knowledge]
      summary: Delete a knowledge document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stats/top-templates:
    get:
      operationId: getTopTemplates
      tags: [stats]
      summary: Get top used templates
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, name, color, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        description:
          type: ["string", "null"]
        templateCount:
          type: integer
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        description:
          type: string

    Template:
      type: object
      required: [id, title, content, categoryId, channels, usageCount, isFavorited, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        channels:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        usageCount:
          type: integer
        isFavorited:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    TemplateInput:
      type: object
      required: [title, content, categoryId, channels]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        categoryId:
          type: integer
        channels:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    TemplateUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        categoryId:
          type: integer
        channels:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    Stats:
      type: object
      required: [totalTemplates, totalCategories, totalUses, favoritedCount, channelBreakdown, categoryBreakdown]
      properties:
        totalTemplates:
          type: integer
        totalCategories:
          type: integer
        totalUses:
          type: integer
        favoritedCount:
          type: integer
        channelBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ChannelCount"
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    ChannelCount:
      type: object
      required: [channel, count]
      properties:
        channel:
          type: string
        count:
          type: integer

    CategoryCount:
      type: object
      required: [categoryId, categoryName, count]
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        count:
          type: integer

    KnowledgeDoc:
      type: object
      required: [id, title, content, category, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    KnowledgeDocInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        category:
          type: string

    KnowledgeDocUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        category:
          type: string
